<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>English Janala | Best platform for learning English</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon" />
    <!-- tailwind + daisyui cdn link -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- font awesome cdn link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- poppins font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Hind Siliguri font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Custom css styles -->
    <style>
      * {
        font-family: "Poppins", sans-serif;
      }
      .font-hindSiliguri {
        font-family: "Hind Siliguri", sans-serif;
      }
    </style>
  </head>
  <body>
    <header class="mb-48">
      <nav class="bg-[#BADEFF]/25 shadow-sm">
        <div class="navbar py-3 w-11/12 mx-auto">
          <div class="navbar-start">
            <div class="dropdown">
              <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="h-5 w-5"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M4 6h16M4 12h8m-8 6h16"
                  />
                </svg>
              </div>
              <ul
                tabindex="-1"
                class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow"
              >
                <li><a class=""><i class="fa-solid fa-circle-question"></i> FAQ</a></li>
                <li><a class=""><i class="fa-solid fa-book-open"></i></i> Learn</a></li>
                <li><a class=""><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a></li>
              </ul>
            </div>
            <a href="" class="flex items-center space-x-1">
                <span class="text-2xl font-semibold">English</span>
                <img src="./assets/logo.png" alt="">
                <span class="font-hindSiliguri text-xl font-semibold">জানালা</span>
            </a>
          </div>
          <div class="navbar-end hidden lg:flex">
            <ul class="menu menu-horizontal px-1 space-x-2">
                <li><a class="btn btn-outline btn-primary"><i class="fa-solid fa-circle-question"></i> FAQ</a></li>
                <li><a class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i></i> Learn</a></li>
                <li><a class="btn btn-outline btn-primary"><i class="fa-solid fa-arrow-right-from-bracket"></i> Logout</a></li>
            </ul>
          </div>
        </div>
      </nav>

      <!-- hero content -->
      <section>
        <div class="content w-11/12 mx-auto flex flex-col-reverse md:flex-row items-center justify-between">
            <!-- Hero text and login form -->
            <div class="flex-1">
                <h1 class="text-4xl font-extrabold mb-5 text-center md:text-left"><span class="text-sky-400">English</span> is Easy!!</h1>
                <p class="font-hindSiliguri text-xl font-medium md:w-11/12 text-center md:text-left mb-7">
                    আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
                </p>
                <!-- login form -->
                <div class="w-3/4 mx-auto md:w-full">
                    <input type="text" placeholder="Enter Your Name" class="input input-md block" />
                    <input type="password" placeholder="Enter Your Password" class="input input-md block my-4" />
                    <button class="btn btn-primary">Get Started</button>
                </div>
            </div>
            <!-- Hero Image -->
            <div class="flex-1">
                <img src="./assets/hero-student.png" alt="">
            </div>
        </div>
      </section>
    </header>
    
    <main>
        <section class="mb-10">
            <h1 class="text-4xl font-extrabold mb-10 text-center"><span class="text-sky-400">Let's</span> Learn Vocabularies</h1>
            <!-- levels container -->
            <div id="levels-container" class="flex gap-5 justify-center flex-wrap">
                
            </div>
        </section>

        <!-- levels informations -->
         <section id="words-container" class="bg-gray-100 p-10 w-11/12 mx-auto rounded-2xl mb-48 grid md:grid-cols-3 gap-4">
            <!-- <div class="bg-white rounded-2xl shadow py-10 px-5 text-center">
                <h2 class="text-3xl font-bold mb-4">Eager</h2>
                <p class="text-lg font-medium mb-5">Meaning /Pronounciation</p>

                <div class="text-3xl font-semibold font-hindSiliguri">"আগ্রহী / ইগার"</div>
                <div class="flex justify-between mt-12">
                    <button class="btn bg-[#1A91FF]/10 border-none"><i class="fa-solid fa-circle-info text-[#374957]"></i></button>
                    <button class="btn bg-[#1A91FF]/10 border-none"><i class="fa-solid fa-volume-high text-[#374957]"></i></button>
                </div>
            </div> -->
         </section>
    </main>

    <!-- script files link -->
    <script src="./scripts/index.js"></script>
  </body>
</html>
